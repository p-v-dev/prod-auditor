version: '3'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=MinhaSenhaSuperSecreta123!
      - DB_NAME=production_db
    depends_on:
      - db
    restart: always

  db:
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=production_db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=MinhaSenhaSuperSecreta123!
    ports:
      - "3306:3306"
